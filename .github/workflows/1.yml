# 工作流名称（顶层合法键值对，无多余字符）
name: Auto Build ExcellentCrates (Folia)

# 触发条件（顶层键值对，结构合规）
on:
  push:
    branches: [ folia-feat ]
  pull_request:
    branches: [ folia-feat ]
  workflow_dispatch:

# 任务定义（核心顶层键值对）
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：检出代码
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 步骤2：配置JDK 17（适配Maven缓存）
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 步骤3：Maven编译构建（无Gradle相关步骤）
      - name: Build with Maven
        run: mvn clean package

      # 步骤4：上传产物（Maven默认路径）
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExcellentCrates-Folia-JAR
          path: |
            ./target/*.jar
            !./target/*-sources.jar
            !./target/*-javadoc.jar